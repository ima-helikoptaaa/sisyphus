name: Sisyphus
options:
  bundleIdPrefix: com.sisyphus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: "11.0.0"
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    majorVersion: "8.0.0"

targets:
  Sisyphus:
    type: application
    platform: iOS
    sources:
      - path: Sisyphus
        excludes:
          - "GoogleService-Info.plist.example"
    settings:
      base:
        INFOPLIST_FILE: Sisyphus/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.adityajha.sisyphus
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
